name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller selenium

      - name: Build EXE
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\build.ps1
        shell: powershell

      - name: Create ZIPs for distribution
        run: |
          # Create release directory
          New-Item -ItemType Directory -Path release -Force

          # Compress teacher distribution
          Compress-Archive -Path dist\teacher -DestinationPath release\teacher-app.zip -Force
          Write-Host "Created: release\teacher-app.zip"

          # Compress student distribution
          Compress-Archive -Path dist\student -DestinationPath release\student-app.zip -Force
          Write-Host "Created: release\student-app.zip"

          # List files
          Get-ChildItem release\
        shell: powershell

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/teacher-app.zip
            release/student-app.zip
          body: |
            ## 配布パッケージ

            - **teacher-app.zip** - 先生PC用（生徒PC起動アプリ.exe + 設定ファイル）
            - **student-app.zip** - 生徒PC用（trigger_server.exe + agent.exe + セットアップスクリプト）

            ### セットアップ手順

            1. 対応するZIPをダウンロードして展開
            2. `.env.example` をコピーして `.env` を作成し、`TRIGGER_TOKEN` を設定
            3. **先生PCのみ:** `students.json.example` をコピーして `students.json` を作成し、生徒データを編集
            4. `setup_teacher.ps1` または `setup_student.ps1` を実行
            5. 詳細は README.md を参照
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
